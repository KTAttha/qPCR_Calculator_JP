<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>実験計算ツール</title>
  <style>
    body {
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f6f7f9;
      margin: 0;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      background: white;
      padding: 32px 26px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 15px;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .button-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    a.button {
      display: block;
      text-decoration: none;
      background: #2d6cdf;
      color: white;
      padding: 16px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s;
    }

    a.button:hover {
      background: #1f55b5;
      transform: translateY(-1px);
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      .container {
        padding: 26px 18px;
      }

      h1 {
        font-size: 24px;
      }

      a.button {
        font-size: 16px;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>実験計算ツール</h1>
    <div class="subtitle">
      RT反応とqPCR反応液の計算用ページ
    </div>

    <div class="button-area">
      <a class="button" href="RNA_RT_batch_calculator.html">RT計算器</a>
      <a class="button" href="qPCR_Calculator_JP.html">qPCR計算器</a>
    </div>
  </div>
</body>
</html>
